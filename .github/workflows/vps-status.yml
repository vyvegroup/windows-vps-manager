name: VPS Status

on:
  workflow_dispatch:

jobs:
  status:
    runs-on: ubuntu-latest
    steps:
      - name: List Active VPS
        run: |
          echo "=== ACTIVE VPS ==="
          curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "${{ github.api_url }}/repos/${{ github.repository }}/actions/workflows/provision-vps.yml/runs?status=in_progress&per_page=50" | \
            jq -r '.workflow_runs[] | "Run #\(.run_number) | ID: \(.id) | \(.status) | \(.created_at)"'
          
          echo ""
          echo "=== RECENT (last 10) ==="
          curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "${{ github.api_url }}/repos/${{ github.repository }}/actions/workflows/provision-vps.yml/runs?status=completed&per_page=10" | \
            jq -r '.workflow_runs[] | "Run #\(.run_number) | ID: \(.id) | \(.conclusion) | \(.created_at)"'
