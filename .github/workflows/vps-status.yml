name: VPS Status Check

on:
  workflow_dispatch:
    inputs:
      action_type:
        description: 'Status Action'
        required: true
        default: 'list_all'
        type: choice
        options:
          - list_all
          - check_specific
      run_id:
        description: 'Run ID (for check_specific)'
        required: false
        default: ''

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: List Active VPS Instances
        run: |
          echo "============================================"
          echo "   ACTIVE VPS INSTANCES"
          echo "============================================"
          
          # List running workflows from provision-vps.yml
          curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/provision-vps.yml/runs?status=in_progress&per_page=100" | \
            jq -r '.workflow_runs[] | "Run #\(.run_number) | ID: \(.id) | Status: \(.status) | Created: \(.created_at) | Name: \(.display_title)"'
          
          echo ""
          echo "============================================"
          echo "   COMPLETED VPS INSTANCES (Last 10)"
          echo "============================================"
          
          curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/provision-vps.yml/runs?status=completed&per_page=10" | \
            jq -r '.workflow_runs[] | "Run #\(.run_number) | ID: \(.id) | Conclusion: \(.conclusion) | Created: \(.created_at)"'
