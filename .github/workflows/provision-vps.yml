name: Provision Windows VPS

on:
  workflow_dispatch:
    inputs:
      vps_name:
        description: 'VPS Name'
        required: true
        default: 'windows-vps-01'
      rdp_password:
        description: 'RDP Password (min 8 chars)'
        required: true
        type: string
      vps_lifetime:
        description: 'Lifetime (minutes) - Max 360'
        required: true
        default: '60'
      ngrok_token:
        description: 'Ngrok Auth Token'
        required: false
        type: string
      timezone:
        description: 'Timezone'
        required: false
        default: 'SE Asia Standard Time'

jobs:
  provision:
    runs-on: windows-latest
    timeout-minutes: ${{ fromJson(github.event.inputs.vps_lifetime || '60') }}

    steps:
      - name: System Info
        run: |
          $ip = (Invoke-WebRequest -Uri 'https://api.ipify.org' -UseBasicParsing).Content
          $os = (Get-CimInstance Win32_OperatingSystem).Caption
          $cpu = (Get-CimInstance Win32_Processor).Name
          $ram = [math]::Round((Get-CimInstance Win32_ComputerSystem).TotalPhysicalMemory / 1GB, 2)
          $disk = [math]::Round((Get-CimInstance Win32_LogicalDisk -Filter "DeviceID='C:'").Size / 1GB, 2)
          
          echo "=============================================" | Tee-Object -FilePath vps-info.txt
          echo "   VPS CREATED SUCCESSFULLY" | Tee-Object -FilePath vps-info.txt -Append
          echo "=============================================" | Tee-Object -FilePath vps-info.txt -Append
          echo "Name:     $env:VPS_NAME" | Tee-Object -FilePath vps-info.txt -Append
          echo "OS:       $os" | Tee-Object -FilePath vps-info.txt -Append
          echo "IP:       $ip" | Tee-Object -FilePath vps-info.txt -Append
          echo "CPU:      $cpu" | Tee-Object -FilePath vps-info.txt -Append
          echo "RAM:      $ram GB" | Tee-Object -FilePath vps-info.txt -Append
          echo "Disk:     $disk GB" | Tee-Object -FilePath vps-info.txt -Append
          echo "Started:  $(Get-Date -Format 'yyyy-MM-dd HH:mm:ss')" | Tee-Object -FilePath vps-info.txt -Append
          echo "Expires:  $(Get-Date).AddMinutes($env:LIFETIME).ToString('yyyy-MM-dd HH:mm:ss')" | Tee-Object -FilePath vps-info.txt -Append
          echo "=============================================" | Tee-Object -FilePath vps-info.txt -Append
          echo "" | Tee-Object -FilePath vps-info.txt -Append
          echo "RDP Credentials:" | Tee-Object -FilePath vps-info.txt -Append
          echo "  Host:     $ip" | Tee-Object -FilePath vps-info.txt -Append
          echo "  Port:     3389" | Tee-Object -FilePath vps-info.txt -Append
          echo "  Username: runneradmin" | Tee-Object -FilePath vps-info.txt -Append
          echo "  Password: $env:RDP_PWD" | Tee-Object -FilePath vps-info.txt -Append
          echo "=============================================" | Tee-Object -FilePath vps-info.txt -Append
        shell: powershell
        env:
          VPS_NAME: ${{ github.event.inputs.vps_name }}
          RDP_PWD: ${{ github.event.inputs.rdp_password }}
          LIFETIME: ${{ github.event.inputs.vps_lifetime }}

      - name: Enable RDP
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name 'fDenyTSConnections' -Value 0
          Enable-NetFirewallRule -DisplayGroup 'Remote Desktop'
          Enable-NetFirewallRule -DisplayGroup 'Core Networking'
          netsh advfirewall firewall add rule name="RDP 3389 TCP" dir=in action=allow protocol=TCP localport=3389
          netsh advfirewall firewall add rule name="RDP 3389 UDP" dir=in action=allow protocol=UDP localport=3389
          
          $sec = ConvertTo-SecureString $env:RDP_PWD -AsPlainText -Force
          Set-LocalUser -Name "runneradmin" -Password $sec -PasswordNeverExpires $true
          
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name 'UserAuthentication' -Value 0
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name 'MaxIdleTime' -Value 0
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name 'fDisableClip' -Value 0
          
          Enable-PSRemoting -Force
          
          Write-Host "✅ RDP Enabled: runneradmin / $env:RDP_PWD"
        shell: powershell
        env:
          RDP_PWD: ${{ github.event.inputs.rdp_password }}

      - name: Setup Ngrok Tunnel
        if: ${{ github.event.inputs.ngrok_token != '' }}
        run: |
          Write-Host "Downloading Ngrok..."
          Invoke-WebRequest -Uri "https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-v3-stable-windows-amd64.zip" -OutFile ngrok.zip
          Expand-Archive ngrok.zip -DestinationPath C:\ngrok
          
          Write-Host "Starting Ngrok tunnel on port 3389..."
          C:\ngrok\ngrok.exe authtoken $env:NGROK_TK
          Start-Process -FilePath "C:\ngrok\ngrok.exe" -ArgumentList "tcp", "3389", "--region", "ap", "--log", "stdout" -NoNewWindow -RedirectStandardOutput ngrok-log.txt
          
          Start-Sleep -Seconds 8
          
          # Get tunnel URL from API
          try {
              $api = Invoke-RestMethod -Uri "http://localhost:4040/api/tunnels" -TimeoutSec 10
              $url = $api.tunnels[0].public_url
              
              echo "" | Tee-Object -FilePath ngrok-url.txt
              echo "=============================================" | Tee-Object -FilePath ngrok-url.txt -Append
              echo "   NGROK RDP TUNNEL ACTIVE" | Tee-Object -FilePath ngrok-url.txt -Append
              echo "=============================================" | Tee-Object -FilePath ngrok-url.txt -Append
              echo "Ngrok URL: $url" | Tee-Object -FilePath ngrok-url.txt -Append
              $host = ($url -replace 'tcp://','') -split ':' | Select-Object -First 1
              $port = ($url -replace 'tcp://','') -split ':' | Select-Object -Last 1
              echo "" | Tee-Object -FilePath ngrok-url.txt -Append
              echo "KET NOI REMOTE DESKTOP:" | Tee-Object -FilePath ngrok-url.txt -Append
              echo "  Host: $host" | Tee-Object -FilePath ngrok-url.txt -Append
              echo "  Port: $port" | Tee-Object -FilePath ngrok-url.txt -Append
              echo "  User: runneradmin" | Tee-Object -FilePath ngrok-url.txt -Append
              echo "  Pass: $env:RDP_PWD" | Tee-Object -FilePath ngrok-url.txt -Append
              echo "" | Tee-Object -FilePath ngrok-url.txt -Append
              echo "HOI LENH TREN CMD:" | Tee-Object -FilePath ngrok-url.txt -Append
              echo "  mstsc /v:$host`:$port" | Tee-Object -FilePath ngrok-url.txt -Append
              echo "=============================================" | Tee-Object -FilePath ngrok-url.txt -Append
              
              Write-Host ""
              Write-Host "============================================="
              Write-Host "   NGROK RDP TUNNEL ACTIVE"
              Write-Host "============================================="
              Write-Host "Ngrok URL: $url"
              Write-Host "  mstsc /v:${host}:${port}"
              Write-Host "  User: runneradmin"
              Write-Host "  Pass: $env:RDP_PWD"
              Write-Host "============================================="
          } catch {
              Write-Host "⚠️ Could not get Ngrok URL: $_"
              Write-Host "Check ngrok-log.txt for details"
          }
        shell: powershell
        env:
          NGROK_TK: ${{ github.event.inputs.ngrok_token }}
          RDP_PWD: ${{ github.event.inputs.rdp_password }}

      - name: Install Software
        run: |
          Write-Host "Installing software..."
          Set-ExecutionPolicy Bypass -Scope Process -Force
          [System.Net.ServicePointManager]::SecurityProtocol = [System.Net.ServicePointManager]::SecurityProtocol -bor 3072
          Invoke-Expression ((New-Object System.Net.WebClient).DownloadString('https://community.chocolatey.org/install.ps1'))
          
          choco install -y googlechrome --no-progress 2>$null
          choco install -y notepadplusplus --no-progress 2>$null
          choco install -y 7zip --no-progress 2>$null
          choco install -y python3 --no-progress 2>$null
          choco install -y nodejs --no-progress 2>$null
          choco install -y vcredist-all --no-progress 2>$null
          
          Write-Host "✅ Software installed"
        shell: powershell
        continue-on-error: true

      - name: Keep VPS Alive
        run: |
          $end = (Get-Date).AddMinutes([int]$env:LIFETIME)
          Write-Host "============================================="
          Write-Host "  VPS RUNNING - Will shutdown at $end"
          Write-Host "============================================="
          Write-Host ""
          
          if (Test-Path ngrok-url.txt) {
              Write-Host "📡 Ngrok RDP Info:"
              Get-Content ngrok-url.txt
              Write-Host ""
          }
          
          while ((Get-Date) -lt $end) {
              $rem = ($end - (Get-Date)).TotalMinutes
              Write-Host "[$(Get-Date -Format 'HH:mm:ss')] Alive - ${rem:N0} min left..."
              Start-Sleep -Seconds 60
          }
          Write-Host "⏰ VPS lifetime expired. Shutting down..."
        shell: powershell
        env:
          LIFETIME: ${{ github.event.inputs.vps_lifetime }}
